model:
  input_dim: 5120
  hidden_dims: [512, 256]
  latent_dim: 32
  hidden_activation: relu
  output_activation: sigmoid
  masking_noise: 0.10
  l1_lambda: 0.0001
training:
  optimizer: adam
  learning_rate: 0.001
  batch_size: 16
  epochs: 8
  early_stopping: false
  seed: 20260621
threshold:
  method: validation_percentile
  target_false_positive_rate: 0.02

model:
  input_dim: 1200
  hidden_dims: [128, 64]
  latent_dim: 16
  hidden_activation: relu
  output_activation: sigmoid
  masking_noise: 0.10
  l1_lambda: 0.0001
training:
  optimizer: adam
  learning_rate: 0.001
  batch_size: 16
  epochs: 8
  early_stopping: false
  seed: 20260517
threshold:
  method: validation_percentile
  target_false_positive_rate: 0.02
